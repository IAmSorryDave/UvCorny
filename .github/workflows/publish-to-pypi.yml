name: Publish Python 🐍 distribution 📦 to PyPi

on:
  pull_request:
    branches:
      - main

jobs:

  setup:
    name: Setup Dependencies
    runs-on: ubuntu-latest
  
    steps:
      - name: Checkout Project
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
  
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
  
      - name: Install UV
        uses: astral-sh/setup-uv@v7
  
      - name: Install dependencies
        run: uv sync --locked --all-extras
  
      - name: Cache UV environment
        uses: actions/upload-artifact@v4
        with:
          name: uv-cache
          path: |
            .venv
            .uv
          retention-days: 1
  
  increment:
    name: Increment Version ⬆️
    needs: setup
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
    
      - name: Checkout Project
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
  
      - name: Install UV
        uses: astral-sh/setup-uv@v7
  
      - name: Restore UV environment
        uses: actions/download-artifact@v4
        with:
          name: uv-cache

      - name: Dry Run Release Major Version Increment
        run: uv version --bump major --dry-run

      - name: Release Major Version Increment
        run: uv version --bump major

      - name: Verify Version Changed
        run: git diff --exit-code pyproject.toml || echo "Version updated successfully"  

      - name: Stage Version Change
        shell: bash
        run:  git add pyproject.toml

      - name: Commit Version Changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Auto-incremented; Released Version $(uv version)."

  build:
    name: Build Distribution 📦
    needs: increment
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
    
    steps:
    
      - name: Checkout Project
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
  
      - name: Install UV
        uses: astral-sh/setup-uv@v7
  
      - name: Restore UV environment
        uses: actions/download-artifact@v4
        with:
          name: uv-cache

      - name: Build Distribution
        run: uv build

      - name: Store Distribution Packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 1

  publish-to-pypi:
    name: Publish Python 🐍 Distribution 📦 to PyPi
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/${{ steps.repo_name.outputs.name }}
    
    permissions:
      id-token: write
      pull-requests: write
      contents: read
    
    steps:

      - name: Set Lowercase Repository Name
        id: repo_name
        run: echo "name=$(echo ${{ github.event.repository.name }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
    
      - name: Checkout Project
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Download Distribution Packages
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      
      - name: Publish Distribution 📦 toPyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Auto-Merge Pull Request
        if: success()
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

