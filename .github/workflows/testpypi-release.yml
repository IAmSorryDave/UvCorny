
name: TestPyPI Release

on: 
  workflow_run: 
    workflows:
      - prepare-testpypi-release
    types: completed

jobs:

  publish-to-testpypi:
      name: Publish Python 🐍 Distribution 📦 to TestPyPi
      runs-on: ubuntu-latest
      strategy:
        fail-fast: true
      environment:
        name: testpypi
        url: https://test.pypi.org/p/${{ steps.repo_name.outputs.name }}
      
      permissions:
        id-token: write
        pull-requests: write
        contents: read
      
      steps:
  
        - name: Set Lowercase Repository Name
          id: repo_name
          run: echo "name=$(echo ${{ github.event.repository.name }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
        
        - name: Download Distribution Packages
          uses: actions/download-artifact@v4
          with:
            name: release-canidate-python-package-distributions
            path: dist/
        
        - name: Publish Distribution 📦 to TestPyPI
          uses: pypa/gh-action-pypi-publish@release/v1
          with:
            repository-url: https://test.pypi.org/legacy/
            skip-existing: true
            verbose: true

  install:
    name: Check TestPyPi Installation
    runs-on: ubuntu-latest
    needs: publish-to-testpypi
    steps:
      - name: Test installation from TestPyPI
        run: |
          uv install --index-url https://test.pypi.org/simple/ $(grep "^name" pyproject.toml | cut -d'"' -f2)==$(grep "^version" pyproject.toml | cut -d'"' -f2)
      
      - name: Smoke test
        run: uv run python -c "import $(grep '^name' pyproject.toml | cut -d'\"' -f2 | tr '-' '_'); print('OK')"
