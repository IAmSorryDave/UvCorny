name: TestPyPI Release

on:
  pull_request:
    branches:
      - main
    types:
      - opened
  push:
    branches:
      - 'rc/v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
      
      - name: Install UV
        uses: astral-sh/setup-uv@v7

      - name: Install YQ
        id: install_yq
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y yq

      - name: Append Requirements to pre-commit Pytest Hook
        id: append_requirements 
        shell: bash
        run: ${PWD}/.sh/scripts/append_requirements.sh
      
      - name: Install Pre-Commit
        run: uv tool install pre-commit --with pre-commit-uv --force-reinstall
  
      - name: Install Hooks
        run: pre-commit install
  
      - name: Run Tests
        run: pre-commit run pytest --all-files
      
  build:
      name: Build Distribution 📦
      needs: test
      runs-on: ubuntu-latest
      
      permissions:
        contents: read
        pull-requests: write
      
      steps:
      
        - name: Checkout Project
          uses: actions/checkout@v6
          with:
            token: ${{ secrets.GITHUB_TOKEN }}
            fetch-depth: 0
  
        - name: Set up Python
          uses: actions/setup-python@v6
          with:
            python-version-file: "pyproject.toml"
    
        - name: Install UV
          uses: astral-sh/setup-uv@v7

        - name: Build Distribution
          run: uv build
          
        - name: Store Distribution Packages
          uses: actions/upload-artifact@v4
          with:
            name: python-package-distributions
            path: dist/
            retention-days: 1

  publish-to-testpypi:
      name: Publish Python 🐍 Distribution 📦 to TestPyPi
      needs: build
      runs-on: ubuntu-latest
      environment:
        name: testpypi
        url: https://test.pypi.org/p/${{ steps.repo_name.outputs.name }}
      
      permissions:
        id-token: write
        pull-requests: write
        contents: read
      
      steps:
  
        - name: Set Lowercase Repository Name
          id: repo_name
          run: echo "name=$(echo ${{ github.event.repository.name }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      
        - name: Checkout Project
          uses: actions/checkout@v6
          with:
            token: ${{ secrets.GITHUB_TOKEN }}
        
        - name: Download Distribution Packages
          uses: actions/download-artifact@v4
          with:
            name: python-package-distributions
            path: dist/
        
        - name: Publish Distribution 📦 to TestPyPI
          uses: pypa/gh-action-pypi-publish@release/v1
          with:
            repository-url: https://test.pypi.org/legacy/
            skip-existing: true
            verbose: true

        - name: Test installation from TestPyPI
          run: |
            uv install --index-url https://test.pypi.org/simple/ $(grep "^name" pyproject.toml | cut -d'"' -f2)==$(grep "^version" pyproject.toml | cut -d'"' -f2)
        
        - name: Smoke test
          run: uv run python -c "import $(grep '^name' pyproject.toml | cut -d'\"' -f2 | tr '-' '_'); print('OK')"
