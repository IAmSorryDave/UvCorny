
name: Development Integration & Patch Bump

on:
  pull_request:
    branches:
      - development
    types:
      - closed

jobs:
  increment_commit_and_create_release_canidate:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
      
      - name: Install UV
        uses: astral-sh/setup-uv@v7
      
      - name: Sync dependencies
        run: |
          uv sync --all-extras
          uv lock

      - name: Test Version Increment 
        id: test_increment
        run: |
          uv version --bump patch --dry-run
      
      - name: Bump patch version
        if: steps.test_increment.conclusion == 'success'
        id: new_version
        run: |
          uv version --bump patch
          echo "version=$(uv version)" >> $GITHUB_OUTPUT

      - name: Configure Git
        id: configure_git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Commit version bump
        if: steps.configure_git.conclusion == 'success'
        id: commit_increment
        run: |
          git add pyproject.toml
          git commit -m "Bumped Version to $(uv version)"
          git push origin develop
      
      - name: Create RC branch
        if: steps.commit_increment.conclusion == 'success'
        id: create_release_canidate_branch
        run: |
          git checkout -b rc/v${{ steps.new_version.outputs.version }}
          git push origin rc/v${{ steps.new_version.outputs.version }}
      
      - name: Open RC merge PR
        if: steps.create_release_canidate_branch.conclusion == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore: release ${{ steps.new_version.outputs.version }}`,
              body: `Automated release candidate for v${{ steps.new_version.outputs.version }}`,
              head: `rc/v${{ steps.new_version.outputs.version }}`,
              base: 'main',
            })
