
name: PyPI Production Release

on:
  pull_request:
    branches:
      - main
    types:
      - closed
jobs:
  publish-to-pypi:
    name: Publish Python 🐍 Distribution 📦 to PyPi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/${{ steps.repo_name.outputs.name }}
    
    permissions:
      id-token: write
      pull-requests: write
      contents: read
    
    steps:
    - name: Set Lowercase Repository Name
      id: repo_name
      run: echo "name=$(echo ${{ github.event.repository.name }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Checkout Project
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Download Distribution Packages
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    
    - name: Publish Distribution 📦 toPyPI
      uses: pypa/gh-action-pypi-publish@release/v1

    - name: Install UV
      uses: astral-sh/setup-uv@v7
    
    - name: Tag release
      run: |
        git tag -a v$(uv version) -m "Release v$(uv version)"
        git push origin v$(uv version)
    
    - name: Create GitHub release
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.repos.createRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            tag_name: 'v$(uv version)',
            name: 'Release v$(uv version)',
            draft: false,
            prerelease: false,
          })  
