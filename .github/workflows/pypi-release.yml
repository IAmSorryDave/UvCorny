
name: PyPI Production Release

on:
  pull_request:
    branches:
      - main
    types:
      - closed
jobs:
  publish-to-pypi:
    if: github.event.pull_request.merged == true
    name: Publish Python 🐍 Distribution 📦 to PyPi
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
    environment:
      name: pypi
      url: https://pypi.org/p/${{ steps.repo_name.outputs.name }}
    
    permissions:
      id-token: write
      pull-requests: write
      contents: read
    
    steps:
    - name: Set Lowercase Repository Name
      id: repo_name
      run: echo "name=$(echo ${{ github.event.repository.name }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
    
    - name: Download Distribution Packages
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    
    - name: Publish Distribution 📦 toPyPI
      uses: pypa/gh-action-pypi-publish@release/v1

  finalize:
    name: Increment Version ⬆️ and Issue Release
    runs-on: ubuntu-latest
    needs: publish-to-pypi

    permissions:
      # Give the default GITHUB_TOKEN write permission to commit and push the
      # added or changed files to the repository.
      contents: write

    steps:

      - name: Checkout Project
        uses: actions/checkout@v6
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install UV
        uses: astral-sh/setup-uv@v7
      
      - name: Dry Run Version Increment
        run: |
          uv version --bump major --dry-run

      - name: Version Increment
        run: |
          uv version --bump major

      - name: Tag release
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: main
          commit_message: "Released v$(uv version)"
          tag_name: "v$(uv version)"
      
      - name: Create GitHub release
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: 'v$(uv version)',
              name: 'Release v$(uv version)',
              draft: false,
              prerelease: false,
            })  
