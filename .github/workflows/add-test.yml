name: Add ➕ Test to Alpha Branch

on:
  push: 
    branches:
      - alpha

jobs:

  increment:
    name: Increment Version ⬆️
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
    
      - name: Checkout Project
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
  
      - name: Install UV
        uses: astral-sh/setup-uv@v7
  
      - name: Restore UV environment
        uses: actions/download-artifact@v4
        with:
          name: uv-cache

      - name: Dry Run Minor Version Increment
        run: uv version --bump patch --dry-run

      - name: Development Version Increment
        run: uv version --bump patch

      - name: Verify Version Changed
        run: git diff --exit-code pyproject.toml || echo "Version updated successfully"

      - name: Stage Version Changes
        run: git add pyproject.toml

      - name: Commit Version Changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Added Test; $(uv version)."

