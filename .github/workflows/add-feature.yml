name: Add ➕ Feature 🔧

on:
  pull_request:
    branches:
      - features
    types: closed

jobs:

  increment:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
    
    - name: Checkout Project
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install UV
      uses: astral-sh/setup-uv@v7
    
    - name: Dry Run Version Increment
      run: |
        uv version --bump minor --dry-run --bump alpha --dry-run

    - name: Version Increment
      run: |
        uv version --bump minor --bump alpha

    - name: Verify Version Changed
      run: git diff --exit-code pyproject.toml || echo "Version updated successfully"

    - name: Tag release
      uses: stefanzweifel/git-auto-commit-action@v7
      with:
        branch: tests
        commit_message: "Released $(uv version)"
        tag_name: "v$(uv version)"
  
