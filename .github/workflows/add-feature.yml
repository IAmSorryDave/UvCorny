name: Add ➕ Feature to Development Branch

on:
  pull_request: 
    branches:
      - development

jobs:

  setup:
    name: Setup Dependencies
    runs-on: ubuntu-latest
  
    steps:
      - name: Checkout Project
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
  
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
  
      - name: Install UV
        uses: astral-sh/setup-uv@v7
  
      - name: Install dependencies
        run: uv sync --locked --all-extras
  
      - name: Cache UV environment
        uses: actions/upload-artifact@v4
        with:
          name: uv-cache
          path: |
            .venv
            .uv
          retention-days: 1

  increment:
    name: Increment Version ⬆️
    needs: setup
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
    
      - name: Checkout Project
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
  
      - name: Install UV
        uses: astral-sh/setup-uv@v7
  
      - name: Restore UV environment
        uses: actions/download-artifact@v4
        with:
          name: uv-cache

      - name: Check if version already has RC suffix
        id: check_version
        run: |
          CURRENT_VERSION=$(uv version)
          if [[ $CURRENT_VERSION == *"dev"* ]]; then
            echo "needs_bump=false" >> $GITHUB_OUTPUT
            echo "Version already contains dev suffix: $CURRENT_VERSION"
          else
            echo "needs_bump=true" >> $GITHUB_OUTPUT
            echo "Version does not contain dev suffix: $CURRENT_VERSION"
          fi

      - name: Dry Run Development Version Increment
        if: steps.check_version.outputs.needs_bump == 'true'
        run: uv version --bump dev --dry-run

      - name: Development Version Increment
        if: steps.check_version.outputs.needs_bump == 'true'
        run: uv version --bump dev

      - name: Dry Run Minor Version Increment
        run: uv version --bump minor --dry-run

      - name: Development Version Increment
        run: uv version --bump minor

      - name: Verify Version Changed
        run: git diff --exit-code pyproject.toml || echo "Version updated successfully"

      - name: Stage Version Changes
        run: git add pyproject.toml

      - name: Commit Version Changes
        if: steps.check_version.outputs.needs_bump == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Added Feature; $(uv version)."

      - name: Auto-Merge Pull Request
        if: success()
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

