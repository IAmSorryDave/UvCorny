name: Add ➕ Fixture to Development Branch

on:
  push: 
    branches:
      - development

jobs:

  increment:
    name: Increment Version ⬆️
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
    
      - name: Checkout Project
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
  
      - name: Install UV
        uses: astral-sh/setup-uv@v7

      - name: Check if version already has Development suffix
        id: check_version
        run: |
          CURRENT_VERSION=$(uv version)
          if [[ $CURRENT_VERSION == *"dev"* ]]; then
            echo "needs_development_bump=false" >> $GITHUB_OUTPUT
            echo "Version already contains development suffix: $CURRENT_VERSION"
          else
            echo "needs_development_bump=true" >> $GITHUB_OUTPUT
            echo "Version does not contain development suffix: $CURRENT_VERSION"
          fi

      - name: Dry Run Development Version Increment
        if: steps.check_version.outputs.needs_development_bump == 'true'
        run: uv version --bump dev --dry-run

      - name: Development Version Increment
        if: steps.check_version.outputs.needs_development_bump == 'true'
        run: uv version --bump dev

      - name: Verify Version Changed
        if: steps.check_version.outputs.needs_development_bump == 'true'
        run: git diff --exit-code pyproject.toml || echo "Version updated successfully"

      - name: Stage Version Changes
        if: steps.check_version.outputs.needs_development_bump == 'true'
        run: git add pyproject.toml

      - name: Commit Version Changes
        if: steps.check_version.outputs.needs_bump == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "$(uv version)."
