
repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    # uv version.
    rev: 0.11.6
    hooks:
      - id: uv-sync
      - id: uv-lock
      - id: uv-export
      - id: sync-metadata
        name: Sync project metadata
        entry: uv run .python/write_documentation.py
        additional_dependencies:
          - jinja2
        files: (pyproject\.toml|README\.md\.jinja)$
        stages: [pre-commit]
        pass_filenames: false
