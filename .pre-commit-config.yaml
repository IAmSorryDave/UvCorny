
repos:

  - repo: https://github.com/astral-sh/uv-pre-commit
    # uv version.
    rev: 0.11.6
    hooks:
      - id: uv-sync
      - id: uv-lock
      - id: uv-export

  - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.4.8
      hooks:
        - id: ruff
        - id: ruff-format

  - repo: local
    hooks:
      - id: write-documentation
        name: Sync project documentation.
        entry: python .python/write_documentation.py
        language: python
        additional_dependencies:
          - jinja2
        files: ^pyproject\.toml$
        stages: [pre-commit]
